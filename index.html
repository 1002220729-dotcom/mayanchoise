<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>בחירת מגמות למנהלים</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f4f7fb;
      --surface: rgba(255,255,255,.92);
      --surface-2: #ffffff;
      --border: rgba(25,85,145,.12);
      --text: #17324d;
      --muted: #5f7891;
      --blue: #1f8fff;
      --blue-dk: #156ed1;
      --teal: #20c7b3;
      --red: #e63757;
      --green: #1ea971;
      --shadow: 0 12px 34px rgba(31,82,130,.10);
      --r: 18px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Heebo', sans-serif; }
    body {
      background:
        radial-gradient(circle at top right, rgba(32,199,179,.08), transparent 24%),
        radial-gradient(circle at top left, rgba(31,143,255,.08), transparent 28%),
        var(--bg);
      color: var(--text);
      min-height: 100vh;
      position: relative;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(31,143,255,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(31,143,255,.03) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: radial-gradient(circle at center, black 45%, transparent 100%);
    }
    .app { position: relative; z-index: 1; max-width: 1180px; margin: 0 auto; padding: 28px 18px 56px; }
    header { text-align: center; margin-bottom: 24px; }
    header h1 { font-size: clamp(1.9rem, 3.4vw, 3rem); font-weight: 900; margin-bottom: 8px; }
    header p { color: var(--muted); font-size: 1.05rem; }
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 26px;
      box-shadow: var(--shadow);
      padding: 22px;
      backdrop-filter: blur(10px);
      margin-bottom: 22px;
    }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
    .fg label { display: block; font-weight: 700; margin-bottom: 8px; }
    .fg input {
      width: 100%; height: 54px; border-radius: 16px; border: 1px solid var(--border);
      background: #f8fbff; padding: 0 16px; font-size: 1rem; color: var(--text);
    }
    .fg input:focus { outline: none; border-color: rgba(31,143,255,.45); box-shadow: 0 0 0 4px rgba(31,143,255,.10); background: #fff; }
    .tracks { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 14px; }
    .card {
      background: linear-gradient(180deg, #fff, #f5f9ff);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 18px 12px 16px;
      text-align: center;
      cursor: pointer;
      transition: .22s ease;
      position: relative;
      overflow: hidden;
      min-height: 152px;
    }
    .card::before {
      content: ""; position: absolute; top: 0; right: 0; left: 0; height: 4px;
      background: linear-gradient(90deg, var(--blue), var(--teal));
    }
    .card:hover:not(.locked) { transform: translateY(-4px); box-shadow: 0 16px 28px rgba(31,82,130,.12); }
    .card.selected { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(31,143,255,.20); }
    .card.locked { opacity: .55; cursor: not-allowed; }
    .card-icon { font-size: 2rem; display: block; margin-bottom: 10px; }
    .card h3 { font-size: .95rem; font-weight: 800; line-height: 1.35; min-height: 48px; }
    .bar { width: 100%; height: 8px; border-radius: 999px; background: #dbe8f5; margin-top: 10px; overflow: hidden; }
    .bar > span { display: block; height: 100%; width: 0%; background: linear-gradient(90deg, var(--blue), var(--teal)); border-radius: 999px; transition: width .25s ease; }
    .score { margin-top: 8px; color: var(--muted); font-weight: 800; }
    .actions { display: flex; gap: 14px; justify-content: center; margin-top: 24px; flex-wrap: wrap; }
    button {
      border: 0; border-radius: 18px; padding: 14px 24px; font-size: 1rem; font-weight: 800; color: #fff;
      cursor: pointer; transition: .2s ease; min-width: 170px;
    }
    button:hover { transform: translateY(-1px); }
    button:disabled { opacity: .55; cursor: not-allowed; transform: none; }
    .btn-primary { background: linear-gradient(90deg, var(--blue), #74b6ff); }
    .btn-secondary { background: linear-gradient(90deg, #6f89a8, #8aa1be); }
    .btn-report { background: linear-gradient(90deg, #1d7cf2, #2b99ff); }
    .section-title { font-size: 1rem; font-weight: 800; color: var(--muted); margin-bottom: 12px; }
    .recent-list, .report-list { display: grid; gap: 10px; }
    .recent-item, .report-row, .report-group {
      background: rgba(255,255,255,.92); border: 1px solid var(--border); border-radius: 16px; padding: 12px 16px;
    }
    .recent-item { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .report-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 18px; }
    .stat {
      background: rgba(255,255,255,.92); border: 1px solid var(--border); border-radius: 18px; padding: 18px; text-align: center;
    }
    .stat .n { font-size: 2rem; font-weight: 900; color: var(--blue-dk); }
    .stat .l { color: var(--muted); font-weight: 700; }
    .report-group-title { display: flex; align-items: center; gap: 8px; font-weight: 800; margin-bottom: 10px; }
    .report-group-body { display: grid; gap: 8px; }
    .report-row { padding: 10px 12px; }
    .page { display: none; }
    .page.active { display: block; }
    .empty-state {
      background: rgba(255,255,255,.72); border: 1px dashed rgba(25,85,145,.25); border-radius: 18px; padding: 18px; text-align: center; color: var(--muted); font-weight: 700;
    }
    @media (max-width: 1024px) { .tracks { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 760px) {
      .form-row, .report-stats { grid-template-columns: 1fr; }
      .tracks { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 520px) {
      .tracks { grid-template-columns: 1fr; }
      button { width: 100%; }
    }
    @media print {
      body::before, .actions, .no-print, header p { display: none !important; }
      .app { max-width: 100%; padding: 0; }
      .panel { box-shadow: none; border: 0; }
      .page { display: none !important; }
      #page-report { display: block !important; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <h1>בחירת מגמות למנהלים</h1>
      <p>מערכת רישום מסודרת עם דוח חלוקה ואיפוס נתונים</p>
    </header>

    <section id="page-register" class="page active">
      <div class="panel">
        <div class="form-row">
          <div class="fg">
            <label for="managerName">שם המנהל/ת</label>
            <input id="managerName" type="text" placeholder="הכניסו את שמכם המלא">
          </div>
          <div class="fg">
            <label for="schoolName">שם בית הספר</label>
            <input id="schoolName" type="text" placeholder="הכניסו את שם בית הספר">
          </div>
        </div>

        <div class="tracks" id="tracksGrid"></div>

        <div class="actions no-print">
          <button id="submitBtn" class="btn-primary" disabled>שליחת הבחירה</button>
          <button id="reportBtn" class="btn-report">📊 דוח חלוקה</button>
          <button id="resetBtn" class="btn-secondary">🔄 איפוס</button>
        </div>
      </div>

      <div class="panel">
        <div class="section-title">רישומים אחרונים</div>
        <div id="recentList" class="recent-list"></div>
      </div>
    </section>

    <section id="page-report" class="page">
      <div class="panel">
        <div class="section-title">📊 דוח חלוקת מגמות</div>
        <div class="report-stats">
          <div class="stat"><div id="totalManagers" class="n">0</div><div class="l">מנהלים נרשמו</div></div>
          <div class="stat"><div id="fullTracks" class="n">0</div><div class="l">מגמות מלאות</div></div>
          <div class="stat"><div id="openTracks" class="n">0</div><div class="l">מגמות פתוחות</div></div>
        </div>
        <div id="reportList" class="report-list"></div>
        <div class="actions no-print">
          <button id="backBtn" class="btn-secondary">← חזרה לרישום</button>
          <button id="printBtn" class="btn-report">🖨️ הדפסה / PDF</button>
        </div>
      </div>
    </section>
  </div>

  <script>
    const API = 'https://mayanchoise.1002220729.workers.dev';
    const TRACKS = [
      { id: 'digital-research', name: 'חקר דיגיטלי – מסביב לעולם', icon: '🌐' },
      { id: 'plastelina', name: 'פלסטלינה', icon: '🎨' },
      { id: 'english-nature', name: 'אנגלית בטבעים', icon: '🌍' },
      { id: 'garden', name: 'גינה מעצימה', icon: '🌱' },
      { id: 'authentic-embroidery', name: 'רקמה אותנטית', icon: '🧵' },
      { id: 'taekwondo', name: 'טקוונאדו', icon: '🥋' },
      { id: 'communication', name: 'תקשורת', icon: '📡' },
      { id: 'electronics', name: 'אלקטרוניקה', icon: '⚡' },
      { id: 'table-tennis', name: 'טניס שולחן', icon: '🏓' },
      { id: 'medical-clowning', name: 'ליצני רפואה', icon: '🤹' }
    ];
    let selected = null;
    let counts = {};
    let allRegistrations = [];
    const els = {
      pageRegister: document.getElementById('page-register'),
      pageReport: document.getElementById('page-report'),
      managerName: document.getElementById('managerName'),
      schoolName: document.getElementById('schoolName'),
      submitBtn: document.getElementById('submitBtn'),
      resetBtn: document.getElementById('resetBtn'),
      reportBtn: document.getElementById('reportBtn'),
      backBtn: document.getElementById('backBtn'),
      printBtn: document.getElementById('printBtn'),
      recentList: document.getElementById('recentList'),
      reportList: document.getElementById('reportList'),
      totalManagers: document.getElementById('totalManagers'),
      fullTracks: document.getElementById('fullTracks'),
      openTracks: document.getElementById('openTracks'),
      tracksGrid: document.getElementById('tracksGrid')
    };
    function toast(message, type = 'ok') {
      const t = document.createElement('div');
      t.textContent = message;
      t.style.position = 'fixed';
      t.style.bottom = '24px';
      t.style.left = '50%';
      t.style.transform = 'translateX(-50%)';
      t.style.padding = '12px 18px';
      t.style.borderRadius = '14px';
      t.style.color = '#fff';
      t.style.fontWeight = '700';
      t.style.zIndex = '9999';
      t.style.boxShadow = '0 10px 30px rgba(0,0,0,.18)';
      t.style.background = type === 'err' ? '#e63757' : '#1f8fff';
      document.body.appendChild(t);
      setTimeout(() => t.remove(), 2400);
    }
    function getTrackById(id) { return TRACKS.find(t => t.id === id); }
    function buildCards() {
      els.tracksGrid.innerHTML = TRACKS.map(track => `
        <div class="card" id="card-${track.id}" data-id="${track.id}">
          <span class="card-icon">${track.icon}</span>
          <h3>${track.name}</h3>
          <div class="bar"><span></span></div>
          <div class="score">5 / 0</div>
        </div>
      `).join('');
      TRACKS.forEach(track => {
        const card = document.getElementById(`card-${track.id}`);
        card.addEventListener('click', () => {
          if (Number(counts[track.id] || 0) >= 5) {
            toast('המגמה מלאה', 'err');
            return;
          }
          selected = track.id;
          refreshCards();
        });
      });
    }
    function refreshSubmit() {
      const okName = els.managerName.value.trim().length > 0;
      const okSchool = els.schoolName.value.trim().length > 0;
      const okTrack = !!selected;
      const selectedCount = selected ? Number(counts[selected] || 0) : 0;
      const trackOpen = selected ? selectedCount < 5 : false;
      els.submitBtn.disabled = !(okName && okSchool && okTrack && trackOpen);
    }
    function refreshCards() {
      TRACKS.forEach(track => {
        const card = document.getElementById(`card-${track.id}`);
        const count = Number(counts[track.id] || 0);
        const locked = count >= 5;
        card.classList.toggle('selected', selected === track.id);
        card.classList.toggle('locked', locked);
        card.querySelector('.score').textContent = `5 / ${count}`;
        card.querySelector('.bar > span').style.width = `${Math.min((count / 5) * 100, 100)}%`;
      });
      refreshSubmit();
    }
    async function loadAll() {
      const [countsRes, reportRes] = await Promise.all([fetch(`${API}/counts`), fetch(`${API}/report`)]);
      const countsJson = await countsRes.json().catch(() => ({}));
      const reportJson = await reportRes.json().catch(() => ({}));
      if (!countsRes.ok) throw new Error(countsJson.error || 'counts failed');
      if (!reportRes.ok) throw new Error(reportJson.error || 'report failed');
      counts = {};
      (countsJson.counts || []).forEach(row => { counts[row.track_id] = Number(row.count || 0); });
      allRegistrations = reportJson.registrations || [];
      refreshCards();
      renderRecent();
      renderReport();
    }
    function renderRecent() {
      const latest = [...allRegistrations].sort((a, b) => new Date(b.created_at) - new Date(a.created_at)).slice(0, 8);
      if (!latest.length) {
        els.recentList.innerHTML = '<div class="empty-state">עדיין אין רישומים</div>';
        return;
      }
      els.recentList.innerHTML = latest.map(item => {
        const icon = getTrackById(item.track_id)?.icon || '📘';
        return `<div class="recent-item"><span>${icon}</span><strong>${item.manager_name}</strong><span>— ${item.school_name}</span><b style="color:#1f8fff">← ${item.track_name}</b></div>`;
      }).join('');
    }
    function renderReport() {
      els.totalManagers.textContent = String(allRegistrations.length);
      els.fullTracks.textContent = String(TRACKS.filter(t => Number(counts[t.id] || 0) >= 5).length);
      els.openTracks.textContent = String(TRACKS.filter(t => Number(counts[t.id] || 0) < 5).length);
      if (!allRegistrations.length) {
        els.reportList.innerHTML = '<div class="empty-state">אין עדיין נתונים לדוח</div>';
        return;
      }
      const grouped = TRACKS.map(track => ({ track, regs: allRegistrations.filter(r => r.track_id === track.id) })).filter(g => g.regs.length);
      els.reportList.innerHTML = grouped.map(({ track, regs }) => `
        <div class="report-group">
          <div class="report-group-title"><span>${track.icon}</span><span>${track.name}</span><span style="color:#5f7891">(${regs.length}/5)</span></div>
          <div class="report-group-body">
            ${regs.map(r => `<div class="report-row"><strong>${r.manager_name}</strong><span>— ${r.school_name}</span></div>`).join('')}
          </div>
        </div>
      `).join('');
    }
    function showPage(page) {
      els.pageRegister.classList.toggle('active', page === 'register');
      els.pageReport.classList.toggle('active', page === 'report');
      if (page === 'report') {
        loadAll().catch(err => { console.error(err); toast('שגיאה בטעינת הדוח', 'err'); });
      }
    }
    async function submitRegistration() {
      const manager_name = els.managerName.value.trim();
      const school_name = els.schoolName.value.trim();
      const track = getTrackById(selected);
      if (!manager_name || !school_name || !track) { toast('נא למלא את כל השדות', 'err'); return; }
      if (Number(counts[selected] || 0) >= 5) { toast('המגמה כבר מלאה', 'err'); return; }
      els.submitBtn.disabled = true;
      try {
        const res = await fetch(`${API}/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ manager_name, school_name, track_id: track.id, track_name: track.name })
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
          if (data.error === 'track_full') throw new Error('המגמה כבר מלאה');
          throw new Error(data.error || 'Registration failed');
        }
        els.managerName.value = '';
        els.schoolName.value = '';
        selected = null;
        await loadAll();
        toast('הבחירה נשמרה בהצלחה', 'ok');
        showPage('register');
      } catch (err) {
        console.error(err);
        toast(err.message || 'שגיאה בשליחת הרישום', 'err');
      } finally { refreshSubmit(); }
    }
    async function resetApp() {
      if (!confirm('האם לאפס את כל הרישומים והנתונים?')) return;
      try {
        const res = await fetch(`${API}/admin/reset`, { method: 'DELETE' });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.error || 'Reset failed');
        els.managerName.value = '';
        els.schoolName.value = '';
        selected = null;
        counts = {};
        allRegistrations = [];
        await loadAll();
        showPage('register');
        toast('כל הנתונים אופסו בהצלחה', 'ok');
      } catch (err) {
        console.error(err);
        toast('האיפוס נכשל', 'err');
      } finally { refreshSubmit(); }
    }
    function bindUI() {
      els.managerName.addEventListener('input', refreshSubmit);
      els.schoolName.addEventListener('input', refreshSubmit);
      els.submitBtn.addEventListener('click', submitRegistration);
      els.resetBtn.addEventListener('click', resetApp);
      els.reportBtn.addEventListener('click', () => showPage('report'));
      els.backBtn.addEventListener('click', () => showPage('register'));
      els.printBtn.addEventListener('click', () => window.print());
    }
    (async function init() {
      buildCards();
      bindUI();
      refreshSubmit();
      try { await loadAll(); } catch (err) { console.error(err); toast('שגיאה בטעינת הנתונים', 'err'); }
    })();
  </script>
</body>
</html>
